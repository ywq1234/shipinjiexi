<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多平台去水印下载器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0a1a;
  min-height: 100vh;
  color: #e0e0e0;
}
.ad-slot {
  position: relative;
  background: rgba(255,255,255,0.02);
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 90px;
  margin: 16px auto;
  max-width: 728px;
  width: 100%;
  color: rgba(255,255,255,0.15);
  font-size: 13px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.ad-slot:hover { border-color: rgba(255,255,255,0.15); }
.ad-slot .ad-label {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
}
.container { max-width: 780px; margin: 0 auto; padding: 20px 16px 40px; }
.header {
  text-align: center;
  padding: 40px 0 10px;
}
.header h1 {
  font-size: 32px;
  background: linear-gradient(135deg, #7c5cfc, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header p { color: rgba(255,255,255,0.45); font-size: 15px; line-height: 1.6; }
.platforms {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 24px 0 20px;
}
.platform-badge {
  background: rgba(124,92,252,0.1);
  border: 1px solid rgba(124,92,252,0.15);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  transition: all 0.2s;
  cursor: default;
}
.platform-badge:hover {
  background: rgba(124,92,252,0.2);
  border-color: #7c5cfc;
  color: #fff;
}
.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.input-group { display: flex; gap: 10px; }
.input-group input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: border 0.2s;
}
.input-group input::placeholder { color: rgba(255,255,255,0.25); }
.input-group input:focus { border-color: #7c5cfc; }
.input-group button {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #7c5cfc, #a855f7);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  white-space: nowrap;
}
.input-group button:hover { opacity: 0.9; }
.input-group button:active { transform: scale(0.97); }
.input-group button:disabled { opacity: 0.4; cursor: not-allowed; }
.detect-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  min-height: 22px;
}
.detect-badge .platform-tag {
  background: rgba(124,92,252,0.15);
  color: #a78bfa;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
}
.status {
  text-align: center;
  padding: 14px;
  border-radius: 10px;
  font-size: 14px;
  margin: 16px 0;
  display: none;
}
.status.loading {
  display: block;
  background: rgba(124,92,252,0.12);
  color: #a78bfa;
  border: 1px solid rgba(124,92,252,0.15);
}
.status.success {
  display: block;
  background: rgba(34,197,94,0.1);
  color: #4ade80;
  border: 1px solid rgba(34,197,94,0.15);
}
.status.error {
  display: block;
  background: rgba(239,68,68,0.1);
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.15);
}
.result { display: none; margin-top: 20px; }
.result.show { display: block; }
.video-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  margin-bottom: 16px;
}
.video-wrap video { width: 100%; display: block; max-height: 520px; }
.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.image-grid img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s;
  background: rgba(0,0,0,0.3);
}
.image-grid img:hover { transform: scale(1.03); }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.info-item {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 12px 14px;
}
.info-item .label { color: rgba(255,255,255,0.35); font-size: 12px; margin-bottom: 4px; }
.info-item .value { color: #ddd; font-size: 14px; word-break: break-all; line-height: 1.5; }
.info-item.full { grid-column: 1 / -1; }
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.action-btn {
  flex: 1;
  min-width: 120px;
  text-align: center;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.action-btn:hover { opacity: 0.85; }
.action-btn:active { transform: scale(0.97); }
.btn-download { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
.btn-copy { background: rgba(255,255,255,0.08); color: #ddd; border: 1px solid rgba(255,255,255,0.1); }
.btn-zip { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
.footer {
  text-align: center;
  padding: 30px 0 10px;
  color: rgba(255,255,255,0.25);
  font-size: 13px;
}
.footer a { color: #7c5cfc; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(124,92,252,0.3);
  border-top-color: #7c5cfc;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@media (max-width: 600px) {
  .header h1 { font-size: 24px; }
  .input-group { flex-direction: column; }
  .input-group button { width: 100%; }
  .info-grid { grid-template-columns: 1fr; }
  .image-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .card { padding: 16px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- 广告位1: 顶部 -->
  <div class="ad-slot" id="ad-top">
    <span class="ad-label">广告</span>
    <span>广告位招租</span>
  </div>

  <!-- 头部 -->
  <div class="header">
    <h1>🌐 多平台去水印下载器</h1>
    <p>粘贴链接，一键解析无水印视频/图片<br>支持抖音 · 豆包 · 快手 · 小红书 · B站 · YouTube · 即梦 · 今日头条 · 微博 等20+平台</p>
  </div>

  <!-- 平台列表 -->
  <div class="platforms" id="platformList"></div>

  <!-- 主卡片 -->
  <div class="card">
    <div class="input-group">
      <input id="urlInput" type="url" placeholder="粘贴视频/图片分享链接..." autocomplete="off">
      <button id="parseBtn" onclick="parseVideo()">解析</button>
    </div>
    <div class="detect-badge" id="detectBadge">🔍 粘贴链接自动识别平台</div>
  </div>

  <!-- 状态 -->
  <div id="status" class="status"></div>

  <!-- 广告位2: 内容间 -->
  <div class="ad-slot" id="ad-content">
    <span class="ad-label">广告</span>
    <span>广告位招租</span>
  </div>

  <!-- 结果 -->
  <div id="result" class="result">
    <div class="card">
      <div class="video-wrap" id="videoWrap" style="display:none">
        <video id="videoPlayer" controls playsinline></video>
      </div>
      <div id="imageWrap" style="display:none">
        <div class="image-grid" id="imageGrid"></div>
      </div>
      <div class="info-grid" id="infoGrid"></div>
      <div class="actions" id="actionBtns"></div>
    </div>
  </div>

  <!-- 广告位3: 底部 -->
  <div class="ad-slot" id="ad-bottom">
    <span class="ad-label">广告</span>
    <span>广告位招租</span>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>本工具仅提供技术解析，内容版权归原作者所有，请勿用于违法违规用途</p>
  </div>
</div>

<script>
const ALL_PLATFORMS = [
  '🎵 抖音', '🫘 豆包', '📹 快手', '📕 小红书', '📺 B站',
  '📱 微博', '📰 今日头条', '🍉 西瓜视频', '🎶 TikTok',
  '▶️ YouTube', '🐦 Twitter/X', '📸 Instagram', '✨ 即梦',
  '💡 千问', '🎮 AcFun', '🐯 虎牙', '❓ 知乎', '👀 好看视频'
];
const platformList = document.getElementById('platformList');
ALL_PLATFORMS.forEach(p => {
  const badge = document.createElement('span');
  badge.className = 'platform-badge';
  badge.textContent = p;
  platformList.appendChild(badge);
});

const PLATFORM_RULES = [
  { match: /douyin/i, name: '抖音', icon: '🎵' },
  { match: /doubao/i, name: '豆包', icon: '🫘' },
  { match: /kuaishou/i, name: '快手', icon: '📹' },
  { match: /xiaohongshu|xhslink/i, name: '小红书', icon: '📕' },
  { match: /bilibili|b23\.tv/i, name: 'B站', icon: '📺' },
  { match: /weibo/i, name: '微博', icon: '📱' },
  { match: /toutiao|ixigua/i, name: '头条/西瓜', icon: '📰' },
  { match: /youtube|youtu\.be/i, name: 'YouTube', icon: '▶️' },
  { match: /tiktok/i, name: 'TikTok', icon: '🎶' },
  { match: /twitter|x\.com/i, name: 'Twitter/X', icon: '🐦' },
  { match: /instagram/i, name: 'Instagram', icon: '📸' },
  { match: /acfun/i, name: 'AcFun', icon: '🎮' },
  { match: /huya/i, name: '虎牙', icon: '🐯' },
  { match: /zhihu/i, name: '知乎', icon: '❓' },
  { match: /haokan|baidu.*video/i, name: '好看视频', icon: '👀' },
  { match: /jimeng/i, name: '即梦', icon: '✨' },
  { match: /qianwen/i, name: '千问', icon: '💡' },
];

document.getElementById('urlInput').addEventListener('input', function() {
  const val = this.value.trim();
  const badge = document.getElementById('detectBadge');
  if (!val) {
    badge.innerHTML = '🔍 粘贴链接自动识别平台';
    return;
  }
  for (const r of PLATFORM_RULES) {
    if (r.match.test(val)) {
      badge.innerHTML = '✅ 已识别: <span class="platform-tag">' + r.icon + ' ' + r.name + '</span>';
      return;
    }
  }
  badge.innerHTML = '❓ 暂未识别平台，仍可尝试解析';
});

async function parseVideo() {
  const url = document.getElementById('urlInput').value.trim();
  const btn = document.getElementById('parseBtn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  if (!url) {
    showStatus('error', '请先粘贴视频/图片分享链接');
    return;
  }

  result.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '解析中...';
  showStatus('loading', '<span class="spinner"></span>正在解析，请稍候...');

  try {
    const resp = await fetch('/api/parse?url=' + encodeURIComponent(url));

    if (!resp.ok) {
      const text = await resp.text();
      showStatus('error', 'HTTP ' + resp.status + '：' + (text || '请求失败'));
      btn.disabled = false;
      btn.textContent = '解析';
      return;
    }

    const data = await resp.json();

    if (data.code !== 200) {
      showStatus('error', '解析失败：' + (data.msg || JSON.stringify(data)));
      btn.disabled = false;
      btn.textContent = '解析';
      return;
    }

    renderResult(data);
    result.classList.add('show');
    showStatus('success', '✅ 解析成功！无水印内容已就绪');

  } catch (err) {
    showStatus('error', '请求失败：' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '解析';
}

function renderResult(data) {
  const d = data.data;
  const videoWrap = document.getElementById('videoWrap');
  const imageWrap = document.getElementById('imageWrap');
  const videoPlayer = document.getElementById('videoPlayer');
  const imageGrid = document.getElementById('imageGrid');
  const infoGrid = document.getElementById('infoGrid');
  const actionBtns = document.getElementById('actionBtns');

  videoWrap.style.display = 'none';
  imageWrap.style.display = 'none';
  imageGrid.innerHTML = '';
  infoGrid.innerHTML = '';
  actionBtns.innerHTML = '';

  const fields = [
    { label: '内容类型', value: d.type === 'video' ? '🎬 视频' : d.type === 'image' ? '🖼️ 图集' : d.type === 'live' ? '📸 实况照片' : '❓ 未知', full: false },
    { label: '标题', value: d.title || '-', full: true },
  ];
  if (d.author) {
    fields.push({ label: '作者', value: d.author.name || '-', full: false });
    fields.push({ label: '作者ID', value: d.author.id || '-', full: false });
  }
  if (d.desc && d.desc !== d.title) {
    fields.push({ label: '描述', value: d.desc.length > 200 ? d.desc.slice(0,200) + '...' : d.desc, full: true });
  }

  fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'info-item' + (f.full ? ' full' : '');
    div.innerHTML = '<div class="label">' + f.label + '</div><div class="value">' + f.value + '</div>';
    infoGrid.appendChild(div);
  });

  if (d.type === 'video' && d.url) {
    videoWrap.style.display = 'block';
    videoPlayer.src = '/api/proxy?url=' + encodeURIComponent(d.url);

    const dl = document.createElement('a');
    dl.className = 'action-btn btn-download';
    dl.href = '/api/proxy?url=' + encodeURIComponent(d.url) + '&dl=1';
    dl.download = 'video.mp4';
    dl.textContent = '⬇ 下载视频';
    actionBtns.appendChild(dl);

    if (d.video_backup && d.video_backup.length > 0) {
      const backupBtn = document.createElement('a');
      backupBtn.className = 'action-btn btn-download';
      backupBtn.style.background = 'linear-gradient(135deg, #6366f1, #4f46e5)';
      backupBtn.href = '/api/proxy?url=' + encodeURIComponent(d.video_backup[0]) + '&dl=1';
      backupBtn.download = 'video.mp4';
      backupBtn.textContent = '🔄 备用线路下载';
      actionBtns.appendChild(backupBtn);
    }
  }

  if (d.type === 'image' && d.images && d.images.length > 0) {
    imageWrap.style.display = 'block';
    d.images.forEach((imgUrl, idx) => {
      const img = document.createElement('img');
      img.src = '/api/proxy?url=' + encodeURIComponent(imgUrl);
      img.alt = '图片 ' + (idx + 1);
      img.loading = 'lazy';
      img.onclick = () => window.open('/api/proxy?url=' + encodeURIComponent(imgUrl), '_blank');
      imageGrid.appendChild(img);
    });

    const zipBtn = document.createElement('a');
    zipBtn.className = 'action-btn btn-zip';
    zipBtn.textContent = '📦 下载全部图片 (' + d.images.length + '张)';
    zipBtn.onclick = () => downloadAllImages(d.images);
    actionBtns.appendChild(zipBtn);
  }

  if (d.type === 'live' && d.live_photo && d.live_photo.length > 0) {
    imageWrap.style.display = 'block';
    d.live_photo.forEach((lp, idx) => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;';
      const img = document.createElement('img');
      img.src = '/api/proxy?url=' + encodeURIComponent(lp.image || lp.cover);
      img.style.width = '100%';
      img.style.borderRadius = '8px';
      wrap.appendChild(img);
      if (lp.video) {
        const playTag = document.createElement('div');
        playTag.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;opacity:0.7;cursor:pointer;';
        playTag.textContent = '▶️';
        playTag.onclick = () => window.open('/api/proxy?url=' + encodeURIComponent(lp.video), '_blank');
        wrap.appendChild(playTag);
      }
      imageGrid.appendChild(wrap);
    });
  }

  if ((d.type === 'video' && d.url) || (d.images && d.images.length > 0)) {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'action-btn btn-copy';
    copyBtn.textContent = '📋 复制原始链接';
    copyBtn.onclick = () => {
      const link = d.url || d.images[0] || '';
      if (link) {
        navigator.clipboard.writeText(link).then(() => {
          showStatus('success', '✅ 链接已复制到剪贴板');
        }).catch(() => {
          showStatus('error', '复制失败，请手动复制');
        });
      }
    };
    actionBtns.appendChild(copyBtn);
  }
}

async function downloadAllImages(images) {
  showStatus('loading', '<span class="spinner"></span>正在准备下载图片...');
  for (let i = 0; i < images.length; i++) {
    const a = document.createElement('a');
    a.href = '/api/proxy?url=' + encodeURIComponent(images[i]) + '&dl=1';
    a.download = 'image_' + (i + 1) + '.jpg';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    await new Promise(r => setTimeout(r, 500));
  }
  showStatus('success', '✅ 所有图片已开始下载');
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}
</script>
</body>
</html>
